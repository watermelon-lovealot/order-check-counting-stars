<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        🍉 T1 Merchandise Tracker - Counting Stars
    </title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>
                🍉 T1 Merchandise Tracker
            </h1>

            <p class="subtitle">
                Counting Stars ✨
            </p>

            <div class="search-box">

                <div class="input-group">

                    <span class="icon">👤</span>

                    <input
                        id="username"
                        type="text"
                        placeholder="User Threads">

                </div>

                <div class="input-group">

                    <span class="icon">📱</span>

                    <input
                        id="phone4"
                        maxlength="4"
                        placeholder="4 số cuối SĐT">

                </div>

                <button id="searchBtn">

                    🔍 Tra cứu

                </button>

            </div>

            <div id="loading" class="loading hidden">

                ⏳ Đang tải dữ liệu...

            </div>

            <div id="output"></div>

        </div>

    </div>

<script src="script.js"></script>

</body>

</html>
