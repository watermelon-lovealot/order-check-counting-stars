<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>T1 Merchandise Tracker - Counting Stars</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }
        body{
            background:linear-gradient(135deg,#ff4d6d,#ffaf40);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }
        .card{
            background:white;
            width:100%;
            max-width:750px;
            border-radius:20px;
            padding:35px;
            box-shadow:0 10px 40px rgba(0,0,0,.15);
        }
        h1{
            text-align:center;
            margin-bottom:10px;
            font-size: 24px;
        }
        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
            font-size: 15px;
        }
        input{
            width:100%;
            padding:14px;
            font-size:16px;
            border-radius:10px;
            border:1px solid #ccc;
            outline: none;
        }
        input:focus {
            border-color: #ff4d6d;
        }
        button{
            margin-top:10px;
            width:100%;
            padding:14px;
            font-size:18px;
            background:#ff4d6d;
            border:none;
            color:white;
            border-radius:10px;
            cursor:pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover{
            background:#ff3257;
        }
        .summary{
            margin-top:25px;
            padding:20px;
            background:#f8f8f8;
            border-radius:15px;
            border: 1px solid #eaeaea;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }
        .ok{ background: #e8f5e9; color:green; }
        .warn{ background: #fff3e0; color:#d35400; }
        .bad{ background: #ffebee; color:red; }
        
        .item{
            margin-top:15px;
            padding:15px;
            border-left:5px solid #ff4d6d;
            background:#fff;
            border-radius:8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .item-title {
            font-size: 16px;
            color: #111;
            margin-bottom: 8px;
        }
        .info-row {
            margin: 4px 0;
            font-size: 14px;
            color: #444;
        }
        .info-label {
            color: #777;
        }
        .shipping-box {
            margin-top: 10px;
            padding: 10px;
            background: #f0f4f8;
            border-radius: 6px;
            font-size: 13.5px;
            border-left: 3px solid #1565c0;
        }
        a{
            color:#1565c0;
            text-decoration:none;
            font-weight: bold;
            display: inline-block;
            margin-top: 8px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🍉 T1 Merchandise Tracker - Counting Stars ✨</h1>
    <p class="subtitle">Tra cứu đơn hàng bảo mật</p>
    <p class="subtitle">Form ship/gdtt: https://forms.gle/fxM7v7xDxqGNstXa6</p>
    
    <div class="input-group">
        <label for="username">Username Threads:</label>
        <input
            id="username"
            placeholder="Ví dụ: watermelon_lovealot"
            onkeydown="if(event.key==='Enter') focusPhone()"
        >
    </div>

    <div class="input-group">
        <label for="phone">4 số cuối SĐT:</label>
        <input
            id="phone"
            type="tel"
            maxlength="4"
            placeholder="Ví dụ: 6612"
            onkeydown="if(event.key==='Enter') searchUser()"
        >
    </div>

    <button onclick="searchUser()">Tra cứu đơn hàng</button>
    <div id="output"></div>
</div>

<script>
// dán link Web App của Google Apps Script có đuôi /exec của bạn vào đây
const url = "https://script.google.com/macros/s/AKfycbxZ8IKeZLZruaOzDiuuQu24knO-9GPS_z81aH_eiCuAzV7IlQtaYv4PpcBkytsRbZ1aRA/exec";

function focusPhone() {
    document.getElementById("phone").focus();
}

async function searchUser(){
    const user = document.getElementById("username").value.trim().toLowerCase();
    const phone = document.getElementById("phone").value.trim();

    if(user == "" || phone == "") {
        alert("Vui lòng nhập đầy đủ cả Username và 4 số cuối SĐT!");
        return;
    }
    
    if(phone.length !== 4 || isNaN(phone)) {
        alert("Vui lòng nhập chính xác 4 chữ số cuối SĐT!");
        return;
    }

    document.getElementById("output").innerHTML = "<div class='summary'><h3>⌛ Đang truy vấn dữ liệu từ cổng bảo mật, vui lòng đợi...</h3></div>";

    try {
        // Tạo URL chứa tham số để gửi trực tiếp lên Google Apps Script
        const apiUrl = `${url}?user=${encodeURIComponent(user)}&phone=${encodeURIComponent(phone)}`;
        
        const rows = await fetch(apiUrl).then(r => r.json());
        
        // Kiểm tra nếu phía Google Apps Script báo lỗi cấu trúc file
        if (rows.error) {
            document.getElementById("output").innerHTML = `<div class='summary'><h3>❌ Lỗi: ${rows.error}</h3></div>`;
            return;
        }

        if(rows.length == 0){
            document.getElementById("output").innerHTML = 
                "<div class='summary'><h3>❌ Không tìm thấy thông tin phù hợp. Vui lòng kiểm tra lại Username hoặc 4 số cuối SĐT!</h3></div>";
            return;
        }

        // Tính tổng tiền
        let total = 0;
        let paid = 0;
        rows.forEach(r => {
            total += Number(r["Tổng tiền"]) || 0;
            paid += Number(r["Đã chuyển"]) || 0;
        });

        let statusClass = "warn";
        let statusText = "🟡 Đã thanh toán một phần";
        if(paid >= total) {
            statusClass = "ok";
            statusText = "🟢 Đã thanh toán đủ";
        } else if(paid == 0) {
            statusClass = "bad";
            statusText = "🔴 Chưa thanh toán";
        }

        let html = `
            <div class="summary">
                <h2>Khách hàng: @${rows[0]["User"]}</h2>
                <div class="status-badge ${statusClass}">${statusText}</div>
                <br><br>
                <div class="info-row"><span class="info-label">💰 Tổng tiền đơn hàng:</span> <b>${total}k</b></div>
                <div class="info-row"><span class="info-label">💸 Đã chuyển khoản:</span> <b>${paid}k</b></div>
                <div class="info-row"><span class="info-label">💵 Còn thiếu:</span> <b>${total - paid}k</b></div>
                
                <hr style="margin:20px 0; border: 0; border-top: 1px dashed #ccc;">
                <h3>📦 Danh sách vật phẩm (${rows.length})</h3>
        `;

        rows.forEach(r => {
            // 1. Xử lý check out MBS
            const mbsCheck = r["Đã check out MBS"] === "x" ? "✅ Đã check out MBS" : "⌛ Chưa check out/Đơn chờ quay Gacha";
            
            // 2. Tình trạng hoàn thành tổng thể
            const hoanThanh = r["Đã hoàn thành"] === "x" ? "<span style='color:green; font-weight:bold;'>🎉 Đã hoàn thành đơn</span>" : "🚚 Đang xử lý";
        
            // 3. Khai thác cột "Trạng thái pickup" thông minh
            let pickupStatus = "";
            const rawPickup = r["Trạng thái pickup"] ? String(r["Trạng thái pickup"]).trim().toLowerCase() : "";
            
            if (rawPickup === "x" || rawPickup === "done") {
                pickupStatus = "<span style='color:green; font-weight:bold;'>✅ Đã lấy hàng (Done Pickup)</span>";
            } else if (rawPickup === "") {
                pickupStatus = "<span style='color:#777;'>⌛ Chờ lấy hàng</span>";
            } else {
                pickupStatus = `<span>📝 ${r["Trạng thái pickup"]}</span>`;
            }
        
            html += `
                <div class="item">
                    <div class="item-title"><b>${r["Items"] || "Không rõ sản phẩm"}</b></div>
                    <div class="info-row"><span class="info-label">Số lượng:</span> ${r["Số lượng"] || 1} | <span class="info-label">Giá:</span> ${r["Tổng tiền"]}k</div>
                    <div class="info-row"><span class="info-label">Ngày đặt:</span> ${r["Date"] || "N/A"}</div>
                    <div class="info-row"><span class="info-label">Trạng thái check out MBS:</span> ${mbsCheck}</div>
                    <div class="info-row"><span class="info-label">Tình trạng pickup:</span> ${pickupStatus}</div>
                    <div class="info-row"><span class="info-label">Trạng thái đơn:</span> ${hoanThanh}</div>
                    <div class="info-row"><span class="info-label">Hình thức:</span> ${r["Hình thức giao dịch"] || "N/A"}</div>
            `;
        
            // Nếu đơn hàng cần ship (có địa chỉ hoặc có thông tin vận đơn) thì hiển thị khối vận chuyển
            if (r["Địa chỉ ship (nếu ship)"] || r["Mã vận đơn SPX (nếu có)"] || r["Tên người nhận"]) {
                html += `
                    <div class="shipping-box">
                        📍 <b>Thông tin nhận hàng:</b><br>
                        • Người nhận: ${r["Tên người nhận"] || "N/A"}<br>
                        • Địa chỉ: ${r["Địa chỉ ship (nếu ship)"] || "N/A"}<br>
                        • Mã vận đơn SPX: <span style="color:#ff4d6d; font-weight:bold;">${r["Mã vận đơn SPX (nếu có)"] || "Chưa có/Đang cập nhật"}</span>
                    </div>
                `;
            }
        
            if (r["Link Threads"]) {
                html += `
                    <a href="${r["Link Threads"]}" target="_blank">
                        🔗 Link User Threads 
                    </a>
                `;
            }
        
            html += `</div>`;
        });

        html += "</div>";
        document.getElementById("output").innerHTML = html;

    } catch (error) {
        console.error(error);
        document.getElementById("output").innerHTML = 
            "<div class='summary'><h3>❌ Lỗi kết nối. Vui lòng kiểm tra lại cấu trúc Web App hoặc quyền truy cập link Script!</h3></div>";
    }
}
</script>
</body>
</html>
