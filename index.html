<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T1 Merchandise Tracker - Counting Stars</title>
<style>
body{font-family:Arial,sans-serif;background:#f6f6f6;margin:0}
.wrap{max-width:900px;margin:30px auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
h1{text-align:center}
.search{display:grid;grid-template-columns:1fr 180px 140px;gap:10px}
.input{position:relative}
.input span{position:absolute;left:10px;top:12px}
input{width:100%;padding:12px 12px 12px 34px;box-sizing:border-box}
button{background:#e53935;color:#fff;border:none;border-radius:8px;font-size:16px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
.card{background:#fafafa;padding:15px;border-radius:10px;text-align:center}
.item{border-left:4px solid #e53935;background:#fcfcfc;padding:12px;margin:12px 0}
.ok{color:green}.warn{color:#d97706}.bad{color:#c62828}
@media(max-width:700px){.search,.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<h1>🍉 T1 Merchandise Tracker</h1>
<p style="text-align:center">Tra cứu bằng Username + 4 số cuối SĐT</p>

<div class="search">
<div class="input"><span>👤</span><input id="username" placeholder="Ví dụ: watermelon_lovealot"></div>
<div class="input"><span>📱</span><input id="phone4" maxlength="4" placeholder="6612"></div>
<button onclick="searchUser()">🔍 Tra cứu</button>
</div>

<div id="output"></div>
</div>

<script>
const URL="https://opensheet.elk.sh/1pBV2xM79M2RVzfG-ogPoHqcS3ZZqXGJ1AVEgWqmB8Rs/Sheet1";
let cache=[];

async function loadData(){
 cache=await fetch(URL+"?t="+Date.now()).then(r=>r.json());
}
loadData();
setInterval(loadData,30000);

function money(v){return Number(v).toLocaleString("vi-VN")+".000đ";}

async function searchUser(){
 if(cache.length===0) await loadData();
 const u=document.getElementById("username").value.trim().replace(/^@/,"").toLowerCase();
 const p=document.getElementById("phone4").value.trim();
 const rows=cache.filter(r=>(r.User||"").toLowerCase()==u && (r["4 số cuối SĐT"]||"")==p);
 const out=document.getElementById("output");
 if(rows.length===0){out.innerHTML="<h3>❌ Không tìm thấy hoặc sai 4 số cuối SĐT.</h3>";return;}
 let total=0,paid=0;
 rows.forEach(r=>{total+=+r["Tổng tiền"]||0;paid+=+r["Đã chuyển"]||0;});
 let st=paid>=total?'<span class="ok">🟢 Đã thanh toán đủ</span>':paid==0?'<span class="bad">🔴 Chưa thanh toán</span>':'<span class="warn">🟡 Đã thanh toán một phần</span>';
 let html=`<h2>@${rows[0].User}</h2>${st}
 <div class="cards">
 <div class="card"><b>💰 Tổng tiền</b><br>${money(total)}</div>
 <div class="card"><b>💸 Đã chuyển</b><br>${money(paid)}</div>
 <div class="card"><b>💵 Còn thiếu</b><br>${money(total-paid)}</div>
 </div>`;
 rows.forEach(r=>{
 html+=`<div class="item">
 <b>${r.Items}</b><br>
 📅 ${r.Date}<br>
 📦 SL: ${r["Số lượng"]}<br>
 💵 ${money(r["Tổng tiền"])}<br>
 ${r["Đã check out MBS"]==="x"?"✅ Đã check out MBS":"⌛ Chưa check out chờ 2nd sale/Đơn chờ quay Gacha"}<br>
 ${(r["Mã vận đơn SPX (khi đơn về HN)"]||"")?`🚚 ${r["Mã vận đơn SPX (khi đơn về HN)"]}<br>`:""}
 ${r["Đã hoàn thành"]==="x"?"🎉 Đã hoàn thành<br>":""}
 <a target="_blank" href="${r["Link Threads"]}">🔗 Xem Threads</a>
 </div>`;
 });
 out.innerHTML=html;
}
</script>
</body>
</html>
